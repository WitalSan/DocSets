<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocSets Jodit</title>
  <link rel="stylesheet" href="jodit.min.css">
  <style>
    html, body, #editor-host { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { font-family: "Segoe UI", sans-serif; }
    #editor-host { display: flex; flex-direction: column; }
    #editor { flex: 1 1 auto; min-height: 0; }
    #editor-host > .jodit-container { flex: 1 1 auto; min-height: 0; border: 0; }
    .jodit-workplace { min-height: 0 !important; }
    .jodit-wysiwyg, .jodit-source { box-sizing: border-box; overflow: auto !important; }
    .jodit-wysiwyg a[href] { cursor: pointer; }
    .jodit-wysiwyg .docsets-pasted-plain { white-space: pre-wrap; }
    .docsets-code-language {
      display: inline-flex;
      align-items: center;
      padding: 2px 3px;
    }
    .docsets-code-language select {
      box-sizing: border-box;
      max-width: 112px;
      height: 28px;
      border: 1px solid transparent;
      border-radius: 3px;
      background: transparent;
      color: inherit;
      font: 12px "Segoe UI", sans-serif;
      cursor: pointer;
    }
    .docsets-code-language select:hover,
    .docsets-code-language select:focus {
      border-color: #999;
      outline: none;
    }
    .jodit-wysiwyg pre.docsets-code-block {
      position: relative;
      overflow: auto;
      padding: 22px 12px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      background: #f6f8fa;
      font-family: Consolas, "Courier New", monospace;
      white-space: pre;
    }
    .jodit-wysiwyg pre.docsets-code-block::before {
      content: attr(data-language);
      position: absolute;
      top: 3px;
      right: 7px;
      color: #666;
      font: 11px "Segoe UI", sans-serif;
      text-transform: uppercase;
    }
    .docsets-image-pending { color: #666; background: #eee; padding: 2px 6px; }
    .docsets-paste-options {
      position: fixed;
      z-index: 2147483647;
      display: flex;
      gap: 2px;
      padding: 4px;
      border: 1px solid #999;
      border-radius: 3px;
      background: #fff;
      color: #222;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .25);
      font: 13px "Segoe UI", sans-serif;
    }
    .docsets-paste-options button {
      padding: 5px 9px;
      border: 1px solid transparent;
      background: transparent;
      color: inherit;
      white-space: nowrap;
      cursor: pointer;
    }
    .docsets-paste-options button:hover,
    .docsets-paste-options button:focus {
      border-color: #0078d4;
      background: #e5f1fb;
      outline: none;
    }
    #status { padding: 18px; color: #666; }
  </style>
</head>
<body>
  <div id="editor-host">
    <div id="status">Инициализация Jodit…</div>
    <textarea id="editor"></textarea>
  </div>
  <script src="jodit.min.js"></script>
  <script src="jodit-editor.js"></script>
</body>
</html>
