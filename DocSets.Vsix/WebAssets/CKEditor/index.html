<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocSets CKEditor</title>
  <link rel="stylesheet" href="ckeditor5.css">
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body { font-family: "Segoe UI", sans-serif; }
    #editor-host { height: 100%; display: flex; flex-direction: column; }
    #editor-host > .ck-editor { min-height: 0; flex: 1; display: flex; flex-direction: column; }
    #editor-host .ck-editor__main { min-height: 0; flex: 1; display: flex; overflow: auto; }
    #editor-host .ck-editor__editable { min-height: 100%; width: 100%; box-sizing: border-box; }
    #editor-host .ck-content a[href] { cursor: pointer; }
    #editor-host .ck-source-editing-area {
      flex: 1 1 auto;
      min-width: 0;
      min-height: 0;
      height: 100%;
      overflow: hidden;
    }
    #editor-host .ck-source-editing-area textarea {
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      box-sizing: border-box;
      overflow: auto !important;
      resize: none;
    }
    #status { padding: 18px; color: #666; }
  </style>
</head>
<body>
  <div id="editor-host"><div id="status">Инициализация CKEditor…</div><div id="editor"></div></div>
  <script src="ckeditor5.umd.js"></script>
  <script src="ckeditor-editor.js"></script>
</body>
</html>
